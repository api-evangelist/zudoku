naftiko: 1.0.0-alpha2
info:
  label: Zudoku Configuration API — Plugins
  description: 'Zudoku Configuration API — Plugins. 1 operations. Lead operation: Zudoku List Plugins. Self-contained Naftiko
    capability covering one Zudoku business surface.'
  tags:
  - Zudoku
  - Plugins
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ZUDOKU_API_KEY: ZUDOKU_API_KEY
capability:
  consumes:
  - type: http
    namespace: configuration-plugins
    baseUri: https://zudoku.dev
    description: Zudoku Configuration API — Plugins business capability. Self-contained, no shared references.
    resources:
    - name: config-plugins
      path: /config/plugins
      operations:
      - name: getplugins
        method: GET
        description: Zudoku List Plugins
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: configuration-plugins-rest
    port: 8080
    description: REST adapter for Zudoku Configuration API — Plugins. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/config/plugins
      name: config-plugins
      description: REST surface for config-plugins.
      operations:
      - method: GET
        name: getplugins
        description: Zudoku List Plugins
        call: configuration-plugins.getplugins
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: configuration-plugins-mcp
    port: 9090
    transport: http
    description: MCP adapter for Zudoku Configuration API — Plugins. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: zudoku-list-plugins
      description: Zudoku List Plugins
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: configuration-plugins.getplugins
      outputParameters:
      - type: object
        mapping: $.

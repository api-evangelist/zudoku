naftiko: 1.0.0-alpha2
info:
  label: Zudoku Configuration API — Navigation
  description: 'Zudoku Configuration API — Navigation. 1 operations. Lead operation: Zudoku Get Navigation Configuration.
    Self-contained Naftiko capability covering one Zudoku business surface.'
  tags:
  - Zudoku
  - Navigation
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ZUDOKU_API_KEY: ZUDOKU_API_KEY
capability:
  consumes:
  - type: http
    namespace: configuration-navigation
    baseUri: https://zudoku.dev
    description: Zudoku Configuration API — Navigation business capability. Self-contained, no shared references.
    resources:
    - name: config-navigation
      path: /config/navigation
      operations:
      - name: getnavigation
        method: GET
        description: Zudoku Get Navigation Configuration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: configuration-navigation-rest
    port: 8080
    description: REST adapter for Zudoku Configuration API — Navigation. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/config/navigation
      name: config-navigation
      description: REST surface for config-navigation.
      operations:
      - method: GET
        name: getnavigation
        description: Zudoku Get Navigation Configuration
        call: configuration-navigation.getnavigation
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: configuration-navigation-mcp
    port: 9090
    transport: http
    description: MCP adapter for Zudoku Configuration API — Navigation. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: zudoku-get-navigation-configuration
      description: Zudoku Get Navigation Configuration
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: configuration-navigation.getnavigation
      outputParameters:
      - type: object
        mapping: $.

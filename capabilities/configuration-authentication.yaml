naftiko: 1.0.0-alpha2
info:
  label: Zudoku Configuration API — Authentication
  description: 'Zudoku Configuration API — Authentication. 1 operations. Lead operation: Zudoku Get Authentication Configuration.
    Self-contained Naftiko capability covering one Zudoku business surface.'
  tags:
  - Zudoku
  - Authentication
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ZUDOKU_API_KEY: ZUDOKU_API_KEY
capability:
  consumes:
  - type: http
    namespace: configuration-authentication
    baseUri: https://zudoku.dev
    description: Zudoku Configuration API — Authentication business capability. Self-contained, no shared references.
    resources:
    - name: config-authentication
      path: /config/authentication
      operations:
      - name: getauthentication
        method: GET
        description: Zudoku Get Authentication Configuration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: configuration-authentication-rest
    port: 8080
    description: REST adapter for Zudoku Configuration API — Authentication. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/config/authentication
      name: config-authentication
      description: REST surface for config-authentication.
      operations:
      - method: GET
        name: getauthentication
        description: Zudoku Get Authentication Configuration
        call: configuration-authentication.getauthentication
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: configuration-authentication-mcp
    port: 9090
    transport: http
    description: MCP adapter for Zudoku Configuration API — Authentication. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: zudoku-get-authentication-configuration
      description: Zudoku Get Authentication Configuration
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: configuration-authentication.getauthentication
      outputParameters:
      - type: object
        mapping: $.

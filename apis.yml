      built by Zuplo. It uses a file-based configuration model
      (zudoku.config.ts) to generate interactive API documentation from OpenAPI
      v2/v3 schemas. The configuration API defines how API references,
      navigation, authentication (OAuth2, OpenID Connect), theming, plugins, and
      MDX documentation pages are structured and managed. Zudoku supports
      multi-API setups, versioned documentation, an integrated API playground
      for testing endpoints with authentication, intelligent search, and static
      site generation for fast, SEO-friendly output.
